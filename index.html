<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bingo da Angel</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  background: #f4f6f8;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  font-family: 'Pacifico', cursive;
  font-size: 48px;
  margin: 15px 0 10px;
  color: #333;
}

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

input {
  padding: 10px;
  font-size: 18px;
  width: 120px;
  border-radius: 8px;
  border: 1px solid #ccc;
  text-align: center;
}

button {
  padding: 10px 18px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #0d6efd;
  color: white;
  font-weight: bold;
}

button:hover {
  background: #084298;
}

/* Bola central */
.ball-display {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: white;
  border: 8px solid #0d6efd;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
  margin: 10px 0;
}

.letter {
  font-size: 60px;
  font-weight: bold;
  color: #0d6efd;
}

.number {
  font-size: 90px;
  font-weight: bold;
  color: #222;
}

/* Painel por letras */
.panel {
  width: 95%;
  max-width: 1100px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-top: 10px;
}

.column {
  background: white;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.15);
}

.column h2 {
  text-align: center;
  font-size: 32px;
  margin: 5px 0 10px;
  color: #0d6efd;
}

.balls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
}

.small-ball {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #0d6efd;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Bingo da Angel</h1>

<div class="controls">
  <input type="number" id="numberInput" placeholder="Número" min="1" max="75">
  <button onclick="draw()">Sortear</button>
  <button onclick="resetGame()">Nova Rodada</button>
</div>

<div id="display" class="ball-display" style="display:none"></div>

<div class="panel" id="panel">
  <div class="column"><h2>B</h2><div class="balls" id="B"></div></div>
  <div class="column"><h2>I</h2><div class="balls" id="I"></div></div>
  <div class="column"><h2>N</h2><div class="balls" id="N"></div></div>
  <div class="column"><h2>G</h2><div class="balls" id="G"></div></div>
  <div class="column"><h2>O</h2><div class="balls" id="O"></div></div>
</div>

<script>
const ranges = [
  {letter:'B', min:1, max:15},
  {letter:'I', min:16, max:30},
  {letter:'N', min:31, max:45},
  {letter:'G', min:46, max:60},
  {letter:'O', min:61, max:75}
];

let drawn = JSON.parse(localStorage.getItem("bingoDrawn")) || [];

function getLetter(num) {
  return ranges.find(r => num >= r.min && num <= r.max)?.letter;
}

function render() {
  ranges.forEach(r => {
    document.getElementById(r.letter).innerHTML = "";
  });

  drawn.forEach(num => {
    const letter = getLetter(num);
    const ball = document.createElement("div");
    ball.className = "small-ball";
    ball.textContent = num;
    document.getElementById(letter).appendChild(ball);
  });

  if (drawn.length) {
    const last = drawn[drawn.length - 1];
    document.getElementById("display").style.display = "flex";
    document.getElementById("display").innerHTML = `
      <div class="letter">${getLetter(last)}</div>
      <div class="number">${last}</div>
    `;
  }
}

function draw() {
  const input = document.getElementById("numberInput");
  const num = Number(input.value);

  if (!num || num < 1 || num > 75 || drawn.includes(num)) {
    input.value = "";
    return;
  }

  drawn.push(num);
  localStorage.setItem("bingoDrawn", JSON.stringify(drawn));
  render();
  input.value = "";
}

function resetGame() {
  if (!confirm("Iniciar nova rodada?")) return;
  drawn = [];
  localStorage.removeItem("bingoDrawn");
  document.getElementById("display").style.display = "none";
  render();
}

render();
</script>

</body>
</html>
